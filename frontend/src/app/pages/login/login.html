<div class="login-wrapper">
  <div class="card">
    <h1>💰 Spese Famiglia</h1>
    <p>Accedi per continuare</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
    />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
    />

    <button (click)="login()" [disabled]="loading">
      {{ loading ? 'Accesso...' : 'Login' }}
    </button>

    <p class="error" *ngIf="error">{{ error }}</p>
  </div>
</div>
