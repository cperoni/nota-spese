<section class="form-section">
  <form (ngSubmit)="submitClicked.emit()" class="card category-inline-form">
    <div class="form-content">
      <div class="field-name">
        <app-ui-text-field
          label="Nome categoria"
          name="nome"
          type="text"
          placeholder="Es. Trasporti"
          [value]="model.nome"
          (valueChange)="modelChange.emit({ ...model, nome: $event })"
          [required]="true"
        ></app-ui-text-field>
      </div>

      <div class="field-color">
        <app-ui-color-field
          label="Colore"
          [value]="model.colore"
          (valueChange)="modelChange.emit({ ...model, colore: $event })"
        ></app-ui-color-field>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [title]="editingId ? 'Salva' : 'Aggiungi'">
          <mat-icon aria-hidden="true">{{ editingId ? icons.actions.save : icons.actions.add }}</mat-icon>
          <span class="btn-label">{{ editingId ? 'Salva' : 'Aggiungi' }}</span>
        </button>
        
        <button
          type="button"
          class="btn btn-secondary"
          *ngIf="editingId"
          (click)="cancelClicked.emit()"
          title="Annulla"
        >
          <mat-icon aria-hidden="true">{{ icons.actions.close }}</mat-icon>
        </button>
      </div>
    </div>
  </form>
</section>
