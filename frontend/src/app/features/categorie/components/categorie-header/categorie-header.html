<header class="page-header">
    <div class="title-group">
      <h2 class="section-title">
        <mat-icon aria-hidden="true">{{ icons.sections.categorie }}</mat-icon>
        <span>Gestione categorie</span>
      </h2>
      <p class="subtitle">Organizza le tue spese con categorie chiare e colori distintivi.</p>
    </div>
  
    <button type="button" class="btn btn-primary icon-start" (click)="addClicked.emit()">
      <mat-icon aria-hidden="true">{{ icons.actions.add }}</mat-icon>
      <span>Nuova categoria</span>
    </button>
  </header>
