<div class="feature-page container">
  <app-categorie-header [icons]="icons" (addClicked)="resetForm()"></app-categorie-header>

  <app-categorie-form
    [icons]="icons"
    [model]="model"
    [editingId]="editingId"
    (submitClicked)="save()"
    (cancelClicked)="resetForm()"
    (modelChange)="model = $event"
  ></app-categorie-form>

  <app-categorie-list
    [icons]="icons"
    [categorie]="categorie"
    (editClicked)="select($event)"
    (deleteClicked)="confirmDelete($event)"
    (emptyActionClicked)="resetForm()"
  ></app-categorie-list>
</div>
