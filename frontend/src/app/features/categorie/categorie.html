<div class="page-wrapper">
  <div class="page container">
    <header class="page-header">
      <div class="title-group">
        <h2 class="section-title">
          <mat-icon aria-hidden="true">{{ icons.sections.categorie }}</mat-icon>
          <span>Gestione categorie</span>
        </h2>
        <p class="subtitle">Organizza le tue spese con categorie chiare e colori distintivi.</p>
      </div>

      <button type="button" class="btn btn-primary icon-start" (click)="resetForm()">
        <mat-icon aria-hidden="true">{{ icons.actions.add }}</mat-icon>
        <span>Nuova categoria</span>
      </button>
    </header>

    <section class="form-section">
      <form (ngSubmit)="save()" class="card form feature-form">
        <div class="feature-form__grid">
          <div class="feature-form__field feature-form__field--full">
            <label for="nome-categoria" class="feature-form__label">Nome categoria</label>
            <input
              id="nome-categoria"
              type="text"
              name="nome"
              [(ngModel)]="model.nome"
              placeholder="Es. Trasporti"
              required
            />
          </div>
      
          <div class="feature-form__field">
            <label for="colore-categoria" class="feature-form__label">Colore</label>
            <input id="colore-categoria" type="color" name="colore" [(ngModel)]="model.colore" />
            <small class="feature-form__hint">Scegli un colore facilmente distinguibile</small>
          </div>
        </div>
      
        <div class="form-actions feature-form__actions">
          <button type="submit" class="btn btn-primary icon-start">
            <mat-icon aria-hidden="true">{{ editingId ? icons.actions.save : icons.actions.add }}</mat-icon>
            <span>{{ editingId ? 'Aggiorna' : 'Aggiungi' }}</span>
          </button>
          <button type="button" class="btn btn-secondary icon-start" *ngIf="editingId" (click)="resetForm()">
            <mat-icon aria-hidden="true">{{ icons.actions.close }}</mat-icon>
            <span>Annulla</span>
          </button>
        </div>
      </form>
    </section>

    <section class="list-section card">
      <h3 class="section-title">
        <mat-icon aria-hidden="true">{{ icons.sections.listaCategorie }}</mat-icon>
        <span>Categorie</span>
      </h3>

      <div class="table-wrap">
        <table class="categorie-table">
          <thead>
            <tr>
              <th>Categoria</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of categorie" (click)="select(c)" class="categorie-row">
              <td>
                <span class="badge" [style.background]="c.colore || '#ccc'">
                  {{ c.nome }}
                </span>
              </td>
              <td class="actions">
                <button
                  mat-icon-button
                  color="primary"
                  aria-label="Modifica"
                  (click)="select(c); $event.stopPropagation()"
                >
                  <mat-icon>{{ icons.actions.edit }}</mat-icon>
                </button>
                <button
                  mat-icon-button
                  color="warn"
                  aria-label="Elimina"
                  (click)="confirmDelete(c); $event.stopPropagation()"
                >
                  <mat-icon>{{ icons.actions.delete }}</mat-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <app-empty-state
        *ngIf="categorie.length === 0"
        [icon]="icons.sections.categorie"
        title="Nessuna categoria presente"
        hint="Crea la prima categoria per organizzare meglio le spese."
        actionLabel="Crea categoria"
        (action)="resetForm()"
      ></app-empty-state>
    </section>
  </div>
</div>
