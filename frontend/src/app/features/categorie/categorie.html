<div class="page container">
  <h2>Categorie</h2>
  <p>Qui potrai inserire, modificare ed eliminare le categorie di spesa.</p>

  <section class="form-section">
    <form (ngSubmit)="save()" class="card form">
      <input
        type="text"
        name="nome"
        [(ngModel)]="model.nome"
        placeholder="Nome categoria (es: Trasporti)"
        required
      />

      <label>
        Colore
        <input type="color" name="colore" [(ngModel)]="model.colore" />
      </label>

      <div class="form-actions">
        <button type="submit">{{ editingId ? 'Aggiorna' : 'Aggiungi' }}</button>
        <button *ngIf="editingId" type="button" class="secondary" (click)="resetForm()">
          Annulla
        </button>
      </div>
    </form>
  </section>

  <section class="list-section">
    <h3>🏷️ Elenco categorie</h3>
    <div class="table-wrap">
      <table class="spese-table">
        <thead>
          <tr>
            <th>Categoria</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of categorie" (click)="select(c)" class="spese-row">
            <td>
              <span class="badge" [style.background]="c.colore || '#ccc'">
                {{ c.nome }}
              </span>
            </td>
            <td>
              <button class="danger" (click)="confirmDelete(c); $event.stopPropagation()">
                Elimina
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
