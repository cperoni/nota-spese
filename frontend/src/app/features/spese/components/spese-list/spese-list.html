<section class="spese-section">
  <div class="card filter-toolbar">
    <div class="toolbar-header">
      <div class="toolbar-label">
        <mat-icon>filter_alt</mat-icon>
        <span>Filtri</span>
      </div>
    </div>

    <div class="filter-grid">
      <div class="filter-item search">
        <app-ui-text-field
          placeholder="Cerca spesa..."
          label="Cerca Spesa"
          [value]="filters.search"
          (valueChange)="onSearch($event)"
        ></app-ui-text-field>
      </div>

      <div class="filter-item category">
        <app-ui-select-field
          label="Categoria"
          [options]="categoriaOptions"
          [value]="filters.categoriaId || ''"
          (valueChange)="onCategoriaChange($event)"
        ></app-ui-select-field>
      </div>

      <div class="filter-item date">
        <app-ui-select-field
          label="Periodo"
          [options]="periodoOptions"
          [value]="filters.periodo"
          (valueChange)="onPeriodoChange($event)"
        ></app-ui-select-field>
      </div>
    </div>

    <div class="form-actions filter-actions">
      <button type="button" class="btn btn-secondary" (click)="resetFilters()">Reset</button>
      <button type="button" class="btn btn-primary" (click)="applyFilters()">Applica</button>
    </div>
  </div>

  <div class="table-wrap" *ngIf="spese.length > 0">
    <table class="spese-table">
      <thead>
        <tr>
          <th>Importo</th>
          <th>Descrizione</th>
          <th>Data</th>
          <th>Categoria</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of spese" (click)="editClicked.emit(s)" class="spese-row">
          <td class="amount-col" [class.negative]="s.importo < 0" [class.positive]="s.importo >= 0">
            <span class="amount-value">{{ s.importo | number:'1.2-2' }}€</span>
          </td>
          <td>{{ s.descrizione }}</td>
          <td>{{ s.data | date: 'dd/MM/yyyy' }}</td>
          <td>
            <div class="category-cell">
              <span
                class="color-dot"
                [style.backgroundColor]="s.categorie?.colore || '#ccc'"
              ></span>
              <span class="category-name">{{ s.categorie?.nome || 'Senza categoria' }}</span>
            </div>
          </td>
          <td class="actions">
            <button
              mat-icon-button
              class="action-btn"
              color="primary"
              aria-label="Modifica"
              (click)="editClicked.emit(s); $event.stopPropagation()"
            >
              <mat-icon>{{ icons.actions.edit }}</mat-icon>
            </button>
            <button
              mat-icon-button
              class="action-btn"
              color="warn"
              aria-label="Elimina"
              (click)="deleteClicked.emit(s); $event.stopPropagation()"
            >
              <mat-icon>{{ icons.actions.delete }}</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <app-empty-state
    *ngIf="spese.length === 0"
    [icon]="icons.sections.listaSpese"
    title="Nessuna spesa trovata"
    hint="Prova a cambiare filtro oppure inserisci una spesa."
    [showAction]="false"
  ></app-empty-state>
</section>
