<header class="page-header">
    <div class="title-group">
      <h2 class="section-title">
        <mat-icon aria-hidden="true">{{ icons.sections.spese }}</mat-icon>
        <span>Gestione spese</span>
      </h2>
      <p class="subtitle">Aggiungi una spesa in pochi secondi e tieni traccia del periodo.</p>
    </div>
  
    <button type="button" class="btn btn-primary icon-start" (click)="addClicked.emit()">
      <mat-icon aria-hidden="true">{{ icons.actions.add }}</mat-icon>
      <span>Nuova spesa</span>
    </button>
  </header>
