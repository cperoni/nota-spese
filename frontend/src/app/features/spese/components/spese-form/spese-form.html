<section class="form-section">
  <form (ngSubmit)="submitClicked.emit()" class="card form feature-form">
    <div class="feature-form__grid">

      <!-- NUOVO: Toggle tipo movimento -->
      <div class="feature-form__field feature-form__field--full">
        <div class="tipo-toggle">
          <button
            type="button"
            class="tipo-btn"
            [class.active-spesa]="tipo === 'spesa'"
            (click)="tipoChange.emit('spesa')"
          >
            <mat-icon aria-hidden="true">arrow_upward</mat-icon>
            Spesa
          </button>
          <button
            type="button"
            class="tipo-btn"
            [class.active-entrata]="tipo === 'entrata'"
            (click)="tipoChange.emit('entrata')"
          >
            <mat-icon aria-hidden="true">arrow_downward</mat-icon>
            Entrata
          </button>
        </div>
      </div>

      <div class="feature-form__field">
        <app-ui-text-field
          label="Importo"
          name="importo"
          type="text"
          inputmode="decimal"
          placeholder="Es. 12,50"
          [value]="importoStr"
          (valueChange)="importoStrChange.emit($event)"
          (blurEvent)="importoBlur.emit()"
          hint="Usa la virgola per i decimali (es. 12,50)"
          [error]="importoError"
          [required]="!!importoError"
        ></app-ui-text-field>
      </div>

      <div class="feature-form__field">
        <app-ui-date-field
          label="Data"
          [value]="data"
          (valueChange)="dataChange.emit($event)"
          [required]="true"
        ></app-ui-date-field>
      </div>

      <div class="feature-form__field feature-form__field--full">
        <app-ui-text-field
          label="Descrizione"
          name="descrizione"
          type="text"
          placeholder="Es. Spesa supermercato"
          [value]="descrizione"
          (valueChange)="descrizioneChange.emit($event)"
        ></app-ui-text-field>
      </div>

      <div class="feature-form__field feature-form__field--full">
        <app-ui-select-field
          label="Categoria"
          [value]="categoria_id"
          [options]="categoriaOptions"
          (valueChange)="categoriaIdChange.emit($event)"
          [required]="true"
        ></app-ui-select-field>
      </div>
    </div>

    <div class="form-actions feature-form__actions">
      <button
        type="button"
        class="btn btn-secondary icon-start"
        *ngIf="editingId"
        (click)="cancelClicked.emit()"
      >
        <mat-icon aria-hidden="true">{{ icons.actions.close }}</mat-icon>
        <span>Annulla</span>
      </button>

      <button type="submit" class="btn icon-start" [class.btn-spesa]="tipo === 'spesa'" [class.btn-entrata]="tipo === 'entrata'">
        <mat-icon aria-hidden="true">{{
          editingId ? icons.actions.save : icons.actions.add
        }}</mat-icon>
        <span>{{ editingId ? 'Aggiorna' : (tipo === 'entrata' ? 'Aggiungi entrata' : 'Aggiungi spesa') }}</span>
      </button>
    </div>
  </form>
</section>
