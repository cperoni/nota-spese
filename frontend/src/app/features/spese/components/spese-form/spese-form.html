<section class="form-section">
  <form (ngSubmit)="submitClicked.emit()" class="card form feature-form">
    <div class="feature-form__grid">
      <div class="feature-form__field">
        <app-ui-text-field
          label="Importo"
          name="importo"
          type="text"
          inputmode="decimal"
          placeholder="Es. 12,50"
          [value]="importoStr"
          (valueChange)="importoStrChange.emit($event)"
          (blurEvent)="importoBlur.emit()"
          hint="Usa la virgola per i decimali (es. 12,50)"
          [error]="importoError"
          [required]="true"
        ></app-ui-text-field>
      </div>

      <div class="feature-form__field">
        <app-ui-date-field
          label="Data"
          [value]="data"
          (valueChange)="dataChange.emit($event)"
          [required]="true"
        ></app-ui-date-field>
      </div>

      <div class="feature-form__field feature-form__field--full">
        <app-ui-text-field
          label="Descrizione"
          name="descrizione"
          type="text"
          placeholder="Es. Spesa supermercato"
          [value]="descrizione"
          (valueChange)="descrizioneChange.emit($event)"
        ></app-ui-text-field>
      </div>

      <div class="feature-form__field feature-form__field--full">
        <app-ui-select-field
          label="Categoria"
          [value]="categoria_id"
          [options]="categoriaOptions"
          (valueChange)="categoriaIdChange.emit($event)"
          [required]="true"
        ></app-ui-select-field>
      </div>
    </div>

    <div class="form-actions feature-form__actions">
      <button type="submit" class="btn btn-primary icon-start">
        <mat-icon aria-hidden="true">{{ editingId ? icons.actions.save : icons.actions.add }}</mat-icon>
        <span>{{ editingId ? 'Aggiorna' : 'Aggiungi' }}</span>
      </button>

      <button
        type="button"
        class="btn btn-secondary icon-start"
        *ngIf="editingId"
        (click)="cancelClicked.emit()"
      >
        <mat-icon aria-hidden="true">{{ icons.actions.close }}</mat-icon>
        <span>Annulla</span>
      </button>
    </div>
  </form>
</section>
