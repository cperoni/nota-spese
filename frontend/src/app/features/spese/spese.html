<div class="container">

  <h2>💰 Inserisci spesa</h2>

  <!-- FORM -->
  <div class="card form">
    <input type="number" placeholder="Importo" [(ngModel)]="importo">

    <input type="date" [(ngModel)]="data">
    
    <input type="text" placeholder="Descrizione" [(ngModel)]="descrizione">

    <select [(ngModel)]="categoria_id">
      <option *ngFor="let c of categorie" [value]="c.id">
        {{ c.nome }}
      </option>
    </select>

    <button (click)="add()">➕ Aggiungi</button>
  </div>

  <div class="filter-bar">
    <label for="filtroPeriodo">Mostra:</label>
    <select
      id="filtroPeriodo"
      [(ngModel)]="filtroPeriodo"
      (ngModelChange)="onFiltroPeriodoChange()"
    >
      <option value="ultimi_7_giorni">Ultimi 7 giorni</option>
      <option value="ultimo_mese">Ultimo mese</option>
      <option value="ultimi_2_mesi">Ultimi 2 mesi</option>
      <option value="ultimi_6_mesi">Ultimi 6 mesi</option>
      <option value="ultimo_anno">Ultimo anno</option>
      <option value="tutte">Tutte le spese</option>
    </select>
  </div>

  <h3>🧾 Ultime spese</h3>

  <!-- LISTA -->
  <div class="list">
    <div class="card item" *ngFor="let s of spese">

      <div class="row">
        <div>
          <b>{{ s.importo }}€</b>
          <div class="desc">{{ s.descrizione }}</div>
          <div class="date">{{ s.data | date: 'dd/MM/yyyy' }}</div>
        </div>

        <div class="right">
          <span
            class="badge"
            [style.background]="s.categorie?.colore || '#ccc'"
          >
            {{ s.categorie?.nome }}
          </span>

          <button class="delete" (click)="delete(s.id)">
            ✕
          </button>
        </div>
      </div>

    </div>

    <div class="card empty" *ngIf="spese.length === 0">
      Nessuna spesa trovata per il filtro selezionato.
    </div>
  </div>

</div>
