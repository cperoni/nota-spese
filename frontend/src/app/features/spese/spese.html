<div class="feature-page container">
  <app-spese-header [icons]="icons" (addClicked)="resetForm()"></app-spese-header>

  <app-spese-form
    [icons]="icons"
    [editingId]="editingId"
    [categorie]="categorie"
    [importoStr]="importoStr"
    [importoError]="importoError"
    [data]="data"
    [descrizione]="descrizione"
    [categoria_id]="categoria_id"
    (submitClicked)="save()"
    (cancelClicked)="resetForm()"
    (importoStrChange)="onImportoChange($event)"
    (importoBlur)="onImportoBlur()"
    (dataChange)="data = $event"
    (descrizioneChange)="descrizione = $event"
    (categoriaIdChange)="categoria_id = $event"
  ></app-spese-form>

  <app-spese-list
    [icons]="icons"
    [spese]="spese"
    [filtroPeriodo]="filtroPeriodo"
    (filtroPeriodoChange)="onFiltroPeriodoChange($event)"
    (editClicked)="select($event)"
    (deleteClicked)="confirmDelete($event)"
    (emptyActionClicked)="resetForm()"
  ></app-spese-list>
</div>
