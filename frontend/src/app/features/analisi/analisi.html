<div class="page">
  <header class="page-header">
    <h2>Analisi</h2>

    <p>
      Grafici riassuntivi delle spese per categoria.
    </p>
  </header>

  <app-analysis-period-filter
    [selected]="selectedPeriod()"
    (selectedChange)="onPeriodChange($event)"
  />

  <app-analysis-stats
    [total]="totalAmount()"
    [previousTotal]="previousTotal()"
    [categoriesCount]="items().length"
    [topCategory]="topCategory()"
  />
<p>Current: {{ totalAmount() }}</p>
<p>Previous: {{ previousTotal() }}</p>
  <section class="charts">
    <app-pie-chart [items]="items()" />
  </section>
</div>
