<div class="page">
  <header class="page-header">
    <h2>Analisi</h2>

    <p>Grafici riassuntivi delle spese per categoria.</p>
  </header>

  <app-analysis-period-filter
    [selected]="selectedPeriod()"
    (selectedChange)="onPeriodChange($event)"
    class="component-spacing"
  />

  <app-expenses-trend-chart [items]="trendItems()" class="component-spacing" />
  <div class="component-spacing"></div>
  <app-analysis-stats
    [totalSpese]="totalSpese()"
    [previousTotalSpese]="previousTotalSpese()"
    [totalEntrate]="totalEntrate()"
    [previousTotalEntrate]="previousTotalEntrate()"
    [categoriesCount]="items().length"
    [topCategory]="topCategory()"
    class="component-spacing"
  />
  <section class="charts">
    <app-pie-chart [items]="items()" />
  </section>
</div>
