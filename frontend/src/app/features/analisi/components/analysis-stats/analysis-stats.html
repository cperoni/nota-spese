<div class="stats-grid">
  <article class="stat-card">
    <span class="label">Spesa totale</span>

    <strong class="value">
      {{ total | currency : 'EUR' }}
    </strong>

    @if (hasTrend) {
      <span
        class="trend"
        [class.positive]="isPositiveTrend"
        [class.negative]="!isPositiveTrend"
      >
        @if (isPositiveTrend) {
          ↑
        } @else {
          ↓
        }

        {{ trendPercentage | abs }}%
        rispetto al periodo precedente
      </span>
    }
  </article>

  <article class="stat-card">
    <span class="label">Categorie</span>

    <strong class="value">
      {{ categoriesCount }}
    </strong>
  </article>

  <article class="stat-card">
    <span class="label">Categoria principale</span>

    <strong class="value">
      {{ topCategory || '-' }}
    </strong>
  </article>
</div>
