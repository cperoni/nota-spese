<div class="stats-grid">
  <app-card-analysis
    label="Spesa totale"
    [value]="totalSpese"
    [trendPercentage]="speseTrendPercentage"
    [isPositiveTrend]="isPositiveSpeseTrend"
    [hasTrend]="hasSpeseTrend"
  />

  <app-card-analysis
    label="Entrate totali"
    [value]="totalEntrate"
    [trendPercentage]="entrateTrendPercentage"
    [isPositiveTrend]="isPositiveEntrateTrend"
    [hasTrend]="hasEntrateTrend"
  />

  <app-card-analysis
    label="Categorie"
    [value]="categoriesCount"
  />

  <app-card-analysis
    label="Categoria principale"
    [value]="topCategory || '-'"
  />
</div>
