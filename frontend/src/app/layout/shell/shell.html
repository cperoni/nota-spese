<mat-sidenav-container class="container">
  <mat-sidenav #sidenav #sidenavEl
    [mode]="sidenavMode"
    [opened]="sidenavOpened"
    (openedChange)="sidenavOpened = $event"
    (backdropClick)="sidenavOpened = false"
  >
    <div class="brand">Nota Spese</div>

    <a
      mat-button
      routerLink="/"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="active"
      (click)="onMenuNavigation()"
    >
      Home
    </a>

    <a mat-button routerLink="/categorie" routerLinkActive="active" (click)="onMenuNavigation()">
      Categorie
    </a>

    <a mat-button routerLink="/analisi" routerLinkActive="active" (click)="onMenuNavigation()">
      Analisi
    </a>

    <button mat-button class="logout" (click)="eseguiLogout(); onMenuNavigation()">Logout</button>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button mat-icon-button type="button" (click)="toggleSidenav()" aria-label="Apri menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span>💰 Nota Spese</span>
    </mat-toolbar>

    <div (click)="onSidenavContentClick($event)">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
