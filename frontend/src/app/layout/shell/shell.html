<mat-sidenav-container class="container">

  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
  >
    <div class="brand">Nota Spese</div>

    <a mat-button routerLink="/" routerLinkActive="active">Home</a>
    <a mat-button routerLink="/categorie" routerLinkActive="active">Categorie</a>
    <a mat-button routerLink="/analisi" routerLinkActive="active">Analisi</a>

    <button mat-button (click)="eseguiLogout()">Logout</button>
  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar class="topbar">
      <!-- SOLO MOBILE -->
      <button
        *ngIf="isMobile"
        mat-icon-button
        (click)="sidenav.toggle()"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <span>💰 Nota Spese</span>
    </mat-toolbar>

    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
