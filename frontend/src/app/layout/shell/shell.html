<mat-sidenav-container class="container">
  <mat-sidenav #sidenav [mode]="sidenavMode" [opened]="sidenavOpened">
    <div class="sidebar-content">
      <div class="brand">Nota Spese</div>

      <nav>
        <button mat-button class="linkButton" routerLink="/" (click)="isMobile && sidenav.close()">
          Home
        </button>
        <button
          mat-button
          class="linkButton"
          routerLink="/categorie"
          (click)="isMobile && sidenav.close()"
        >
          Categorie
        </button>
        <button
          mat-button
          class="linkButton"
          routerLink="/analisi"
          (click)="isMobile && sidenav.close()"
        >
          Analisi
        </button>
      </nav>

      <button mat-button class="linkButton" (click)="eseguiLogout()">Logout</button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button mat-icon-button *ngIf="isMobile" (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="app-title">💰 Nota Spese</span>

      <span class="spacer"></span>

      <button mat-icon-button (click)="toggleTheme()" aria-label="Cambia tema">
        <mat-icon>{{ isDarkTheme ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </mat-toolbar>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

  <app-loading-spinner></app-loading-spinner>
</mat-sidenav-container>
