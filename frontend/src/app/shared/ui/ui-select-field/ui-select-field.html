<mat-form-field appearance="outline" class="ui-field">
    <mat-label>{{ label }}</mat-label>
  
    <mat-select
      [ngModel]="value"
      (ngModelChange)="onChange($event)"
      [required]="required"
    >
      <mat-option *ngFor="let opt of options" [value]="opt.value">
        {{ opt.label }}
      </mat-option>
    </mat-select>
  </mat-form-field>
